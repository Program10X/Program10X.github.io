<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Portal | Program10X</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght=500;700&family=Inter:wght=400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* CORE INITIALIZATION */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #020204;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .wrapper {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* ─── LEFT SIDEBAR (AMIGO STYLE) ─── */
        .sidebar {
            width: 320px;
            background: #0b0f19;
            border-right: 1px solid rgba(0, 255, 102, 0.2);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar-header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            color: #00ff66;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
            text-transform: uppercase;
        }
        .course-display-title {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 5px;
            font-weight: 600;
        }

        /* MODULE LIST (SCROLLABLE) */
        .module-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px 10px;
        }

        /* Amigo Accordion Structure */
        .module-section {
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .module-header {
            padding: 12px 15px;
            background: rgba(26, 115, 232, 0.1);
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.2s;
        }
        .module-header:hover {
            background: rgba(0, 255, 102, 0.1);
            color: #00ff66;
        }

        .module-items {
            padding: 5px 0;
        }

        /* Inner Sub-items (Links) */
        .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 12px;
            transition: 0.2s;
            border-left: 3px solid transparent;
        }
        .menu-item i {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
        }
        .menu-item:hover {
            color: #38bdf8;
            background: rgba(255, 255, 255, 0.02);
        }
        .menu-item.active {
            background: rgba(0, 255, 102, 0.08);
            color: #00ff66;
            border-left-color: #00ff66;
            font-weight: 600;
        }
        .menu-item.active i {
            color: #00ff66;
        }

        .back-dashboard {
            padding: 15px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: #040710;
        }
        .back-btn {
            display: block;
            color: #ef4444;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            padding: 10px;
            border: 1px dashed #ef4444;
            border-radius: 6px;
            transition: 0.2s;
        }
        .back-btn:hover {
            background: #ef4444;
            color: #fff;
        }

        /* ─── RIGHT MAIN CONTENT AREA ─── */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: #020204;
            display: flex;
            flex-direction: column;
        }

        .content-card {
            background: #0b0f19;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 35px;
            min-height: 85vh;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .content-card h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            color: #ffffff;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .content-card p {
            color: #cbd5e1;
            line-height: 1.8;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- बाएँ हाथ का कोर्स मेनू (Amigo Style) -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Course Menu</h2>
                <div class="course-display-title" id="course-main-title">Loading Course...</div>
            </div>
            
            <div class="module-list" id="sidebar-sections">
                <!-- यहाँ जावास्क्रिप्ट से डायनामिक फोल्डर्स/ड्रॉपडाउन लिस्ट आएगी -->
            </div>
            
            <div class="back-dashboard">
                <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
            </div>
        </aside>

        <!-- दाएँ हाथ का कंटेंट बॉक्स -->
        <main class="main-content">
            <div class="content-card" id="live-content">
                <!-- यहाँ पर क्लिक करने से असली कोड/नोट्स लोड होंगे -->
            </div>
        </main>
    </div>

    <!-- डेटा सोर्स फ़ाइल लिंक -->
    <script src="course-data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const courseKey = urlParams.get('course');

        if (courseKey && allCourses[courseKey]) {
            const currentCourse = allCourses[courseKey];
            
            // मुख्य टाइटल सेट करें
            document.getElementById("course-main-title").innerText = currentCourse.title;

            const sectionsContainer = document.getElementById("sidebar-sections");
            
            // Amigo स्टाइल स्ट्रक्चर बनाना 
            // डेटा को लूप करके ड्रॉपडाउन सेक्शन्स बनाना
            const sectionDiv = document.createElement("div");
            sectionDiv.className = "module-section";

            const headerDiv = document.createElement("div");
            headerDiv.className = "module-header";
            headerDiv.innerHTML = `<span>Contents</span> <i class="fa-solid fa-chevron-down"></i>`;
            sectionDiv.appendChild(headerDiv);

            const itemsContainer = document.createElement("div");
            itemsContainer.className = "module-items";

            currentCourse.modules.forEach((mod, index) => {
                const itemLink = document.createElement("a");
                itemLink.href = "#";
                itemLink.className = `menu-item ${index === 0 ? 'active' : ''}`;
                itemLink.innerHTML = `<i class="fa-regular fa-circle"></i> <span>${mod.name}</span>`;
                
                itemLink.onclick = function(e) {
                    e.preventDefault();
                    document.querySelectorAll('.menu-item').forEach(b => b.classList.remove('active'));
                    itemLink.classList.add('active');
                    
                    // कंटेंट बदलें
                    document.getElementById("live-content").innerHTML = mod.content;
                };

                itemsContainer.appendChild(itemLink);
            });

            sectionDiv.appendChild(itemsContainer);
            sectionsContainer.appendChild(sectionDiv);

            // पहला पेज डिफ़ॉल्ट रूप से दिखाएं
            if(currentCourse.modules.length > 0) {
                document.getElementById("live-content").innerHTML = currentCourse.modules[0].content;
            }
        } else {
            document.getElementById("live-content").innerHTML = "<h3>Course Not Found</h3><p>कृपया डैशबोर्ड पर वापस जाकर सही कोर्स चुनें।</p>";
        }
    </script>
</body>
</html>
