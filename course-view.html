<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course View | Program10X</title>
    <style>
        /* आपकी वेबसाइट की थीम से मैच करता हुआ डिज़ाइन */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0f19; color: #f3f4f6; display: flex; height: 100vh; overflow: hidden; }
        
        .wrapper { display: flex; width: 100%; height: 100%; }

        /* Left Side Menu (Sidebar) */
        .sidebar { width: 320px; background-color: #111827; border-right: 1px solid #1f2937; padding: 25px; display: flex; flex-direction: column; }
        .sidebar h2 { font-size: 22px; color: #ffffff; margin-bottom: 5px; font-weight: 700; }
        .sidebar .subtitle { font-size: 12px; color: #10b981; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; }
        
        .module-list { flex: 1; overflow-y: auto; }
        .menu-item { display: block; padding: 14px; color: #9ca3af; text-decoration: none; border-radius: 8px; margin-bottom: 10px; font-size: 14px; background-color: #1f2937; transition: all 0.3s ease; border-left: 4px solid transparent; }
        .menu-item:hover { background-color: #374151; color: #ffffff; }
        .menu-item.active { background-color: #2563eb; color: #ffffff; border-left: 4px solid #10b981; font-weight: 600; }
        
        .back-btn { margin-top: auto; padding: 12px; text-align: center; color: #ef4444; text-decoration: none; font-size: 14px; font-weight: 600; border: 1px dashed #ef4444; border-radius: 8px; transition: 0.3s; }
        .back-btn:hover { background-color: #ef4444; color: white; }

        /* Right Side Content Area */
        .main-content { flex: 1; padding: 40px 50px; overflow-y: auto; background-color: #0f172a; }
        .content-box { background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; min-height: 80%; }
        .content-box h3 { font-size: 24px; margin-bottom: 15px; color: #ffffff; }
        .content-box p { color: #cbd5e1; line-height: 1.7; font-size: 16px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- बाएँ हाथ का साइडबार -->
        <aside class="sidebar">
            <h2 id="course-title">Loading...</h2>
            <div class="subtitle" id="course-subtitle">Please wait</div>
            
            <div class="module-list" id="module-container">
                <!-- यहाँ जावास्क्रिप्ट से मॉड्यूल्स की लिस्ट आएगी -->
            </div>
            
            <a href="dashboard.html" class="back-btn">🔙 Back to Dashboard</a>
        </aside>

        <!-- दाएँ हाथ का मुख्य कंटेंट -->
        <main class="main-content">
            <div class="content-box" id="live-content">
                <!-- यहाँ हर मॉड्यूल का असली कोड/कंटेंट दिखेगा -->
            </div>
        </main>
    </div>

    <!-- पहले डेटा लोड करें फिर लॉजिक चलाएं -->
    <script src="course-data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const courseKey = urlParams.get('course');

        if (courseKey && allCourses[courseKey]) {
            const currentCourse = allCourses[courseKey];
            
            // टाइटल सेट करें
            document.getElementById("course-title").innerText = currentCourse.title;
            document.getElementById("course-subtitle").innerText = currentCourse.subtitle;

            const container = document.getElementById("module-container");
            
            // साइडबार मेनू तैयार करना
            currentCourse.modules.forEach((mod, index) => {
                const link = document.createElement("a");
                link.href = "#";
                link.className = `menu-item ${index === 0 ? 'active' : ''}`;
                link.innerText = mod.name;
                
                link.onclick = function(e) {
                    e.preventDefault();
                    document.querySelectorAll('.menu-item').forEach(b => b.classList.remove('active'));
                    link.classList.add('active');
                    
                    // दाएँ तरफ का कंटेंट बदलना
                    document.getElementById("live-content").innerHTML = mod.content;
                };
                container.appendChild(link);
            });

            // पहला मॉड्यूल डिफ़ॉल्ट रूप से दिखाएं
            if(currentCourse.modules.length > 0) {
                document.getElementById("live-content").innerHTML = currentCourse.modules[0].content;
            }
        } else {
            document.getElementById("live-content").innerHTML = "<h3>Course Not Found</h3><p>कृपया डैशबोर्ड से सही कोर्स चुनकर आएं।</p>";
        }
    </script>
</body>
</html>
