<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program10X | Advanced Student Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 1. CORE LAYOUT */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #020204;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 🟩 LIVE BACKGROUND MATRIX STREAMS */
        #coderRain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.18; 
            pointer-events: none;
            z-index: 1;
        }

        /* 📋 NEON CONTEMPORARY NAVBAR */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 75px;
            background: rgba(10, 15, 28, 0.85);
            border-bottom: 1px solid rgba(0, 255, 102, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            z-index: 100;
            backdrop-filter: blur(15px);
        }
        .navbar .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem; font-weight: 700; color: #1a73e8; letter-spacing: 2px;
        }
        .navbar .logo span { color: #00ff66; text-shadow: 0 0 15px rgba(0, 255, 102, 0.5); }
        .navbar .user-profile { display: flex; align-items: center; gap: 15px; }
        .navbar .avatar {
            width: 40px; height: 40px; background: #1a73e8; color: white;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-weight: 800; box-shadow: 0 0 10px rgba(26, 115, 232, 0.5);
        }

        /* 🗂️ MAIN HOUSING CONTAINER */
        .main-container {
            margin-top: 75px;
            width: 100%;
            display: flex;
            padding: 40px;
            gap: 30px;
            z-index: 5;
            position: relative;
        }

        /* LEFT CONTENT BOARD */
        .content-area { flex: 3; }
        .content-area h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem; margin-bottom: 30px;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* MODERN HIGH-TECH GRID CARDS */
        .course-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            overflow: hidden;
            transition: 0.3s;
        }
        .course-card:hover {
            transform: translateY(-8px);
            border-color: #00ff66;
            box-shadow: 0 10px 30px rgba(0, 255, 102, 0.15);
        }
        .card-img {
            height: 130px;
            background: rgba(0, 0, 0, 0.4);
            display: flex; justify-content: center; align-items: center;
            font-size: 3rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }
        .card-body { padding: 20px; }
        
        .card-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; height: 52px;
            display: flex; align-items: center; line-height: 1.3; color: #ffffff;
        }

        /* METADATA TECH BADGES */
        .tech-badge {
            display: inline-block;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: 800;
            background: rgba(26, 115, 232, 0.15);
            color: #38bdf8;
            border: 1px solid rgba(26, 115, 232, 0.3);
            border-radius: 6px;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .course-card:hover .tech-badge {
            background: rgba(0, 255, 102, 0.1);
            color: #00ff66;
            border-color: rgba(0, 255, 102, 0.3);
        }

        /* 🟩 DYNAMIC COMPACT GREEN PROGRESS TRACKER */
        .tracker-box { margin-bottom: 15px; }
        .tracker-text { font-size: 11px; font-weight: 800; color: #00ff66; margin-bottom: 6px; }
        .tracker-bg { width: 100%; height: 6px; background: #000; border-radius: 10px; overflow: hidden; }
        .tracker-fill { height: 100%; background: #00ff66; box-shadow: 0 0 10px #00ff66; transition: 1s ease; }

        .btn-view {
            display: block; width: 100%; text-align: center; padding: 10px;
            background: rgba(26, 115, 232, 0.1); border: 1px solid #1a73e8;
            color: #38bdf8; text-decoration: none; border-radius: 8px; font-weight: 700; font-size: 13px;
        }
        .btn-view:hover { background: #00ff66; color: #000; border-color: #00ff66; }

        /* RIGHT SIDEBAR MODULES */
        .sidebar { flex: 1; min-width: 320px; display: flex; flex-direction: column; gap: 25px; }
        .widget {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; backdrop-filter: blur(10px);
        }
        .widget h3 { font-size: 1.1rem; margin-bottom: 15px; border-left: 4px solid #00ff66; padding-left: 10px; }

        /* 📅 SIDEBAR COMPACT CYBER CALENDAR */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day-name { font-size: 10px; font-weight: 800; color: #1a73e8; padding-bottom: 5px; }
        .date { font-size: 12px; padding: 8px; border-radius: 6px; background: rgba(255, 255, 255, 0.03); }
        .date.today { background: #00ff66; color: #000; font-weight: 900; box-shadow: 0 0 10px #00ff66; }
        .date:hover { background: rgba(0, 255, 102, 0.2); }

        .recent-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .recent-item i { color: #00ff66; }
        .recent-item div h4 { font-size: 13px; margin-bottom: 2px; }
        .recent-item div p { font-size: 11px; color: #94a3b8; }

        @media (max-width: 1100px) { .main-container { flex-direction: column; } .sidebar { width: 100%; } }

        /* ⚡ RE-ENGINEERED PREMIUM GLITCH KEYFRAMES FOR MATH THUMBNAIL */
        @keyframes gridGlow {
            0%, 100% { opacity: 0.8; background-size: 12px 12px; }
            50% { opacity: 1; background-size: 14px 14px; filter: hue-rotate(15deg); }
        }
        @keyframes cyberBrain {
            0%, 100% { transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 8px #00ff66); color: #00ff66; }
            33% { transform: scale(1.08) rotate(2deg); filter: drop-shadow(0 0 18px #38bdf8); color: #38bdf8; }
            66% { transform: scale(0.95) rotate(-2deg); filter: drop-shadow(0 0 12px #00ff66); color: #00ff66; }
        }
        @keyframes formulaWave {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.75; }
            50% { transform: translateY(-8px) translateX(4px) scale(1.05); opacity: 1; filter: saturate(1.5); }
        }
    </style>
</head>
<body>

    <canvas id="coderRain"></canvas>

    <div class="navbar">
        <div class="logo">PROGRAM<span>10X</span></div>
        <div class="user-profile">
            <span style="font-size: 13px; color: #94a3b8;">Welcome, Developer</span>
            <div class="avatar">S</div>
        </div>
    </div>

    <div class="main-container">
        <div class="content-area">
            <h2>Course overview</h2>
            <div class="courses-grid">
                
                <div class="course-card">
                    <div class="card-img" style="background: #02050e; display: flex; align-items: center; justify-content: center; position: relative; border-bottom: 1px solid rgba(0, 255, 102, 0.15);">
                        <div style="position: absolute; inset: 0; background-image: linear-gradient(rgba(26, 115, 232, 0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(26, 115, 232, 0.08) 1px, transparent 1px); background-size: 12px 12px; animation: gridGlow 8s linear infinite;"></div>
