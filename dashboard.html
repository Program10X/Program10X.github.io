<div class="course-card">
    <div class="card-img" style="background: #02050e; display: flex; align-items: center; justify-content: center; position: relative; border-bottom: 1px solid rgba(0, 255, 102, 0.15);">
        
        <div style="position: absolute; inset: 0; background-image: linear-gradient(rgba(26, 115, 232, 0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(26, 115, 232, 0.08) 1px, transparent 1px); background-size: 12px 12px; animation: gridGlow 8s linear infinite;"></div>
        
        <div style="position: absolute; left: 25px; width: 65px; height: 65px; background: radial-gradient(circle, rgba(0, 255, 102, 0.15) 0%, transparent 75%); display: flex; align-items: center; justify-content: center;">
            <i class="fa-solid fa-brain" style="font-size: 2.6rem; color: #00ff66; filter: drop-shadow(0 0 15px #00ff66); animation: cyberBrain 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;"></i>
        </div>

        <div style="position: absolute; right: 20px; height: 100%; width: 150px; font-family: 'Space Grotesk', monospace; overflow: hidden;">
            <span style="position: absolute; top: 12px; left: 5px; color: #38bdf8; font-size: 14px; font-weight: 700; filter: drop-shadow(0 0 8px #1a73e8); animation: formulaWave 3.5s ease-in-out infinite;">&sum; (2ⁿ / n!)</span>
            <span style="position: absolute; top: 45px; right: 5px; color: #00ff66; font-size: 15px; font-weight: 700; filter: drop-shadow(0 0 8px #00ff66); animation: formulaWave 4.2s ease-in-out infinite 0.8s;">&int; e<sup>-x²</sup> dx</span>
            <span style="position: absolute; bottom: 18px; left: 15px; color: #ffffff; font-size: 12px; font-weight: 600; opacity: 0.9; animation: formulaWave 3.8s ease-in-out infinite 1.5s;">f(x) = &sigma;(Wᵀx)</span>
            <span style="position: absolute; top: 78px; left: 25px; color: #c084fc; font-size: 13px; opacity: 0.8; animation: formulaWave 5s ease-in-out infinite 0.3s;">&pi;r² &plusmn; &lambda;</span>
        </div>

        <style>
            @keyframes gridGlow {
                0%, 100% { opacity: 0.8; background-size: 12px 12px; }
                50% { opacity: 1; background-size: 14px 14px; filter: hue-rotate(15deg); }
            }
            @keyframes cyberBrain {
                0%, 100% { transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 8px #00ff66); color: #00ff66; }
                33% { transform: scale(1.08) rotate(2deg); filter: drop-shadow(0 0 18px #38bdf8); color: #38bdf8; }
                66% { transform: scale(0.95) rotate(-2deg); filter: drop-shadow(0 0 12px #00ff66); color: #00ff66; }
            }
            @keyframes formulaWave {
                0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.75; }
                50% { transform: translateY(-8px) translateX(4px) scale(1.05); opacity: 1; filter: saturate(1.5); }
            }
        </style>
    </div>
