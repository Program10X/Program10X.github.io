<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program10X | Login to Learn C & AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #05070f;
            color: #ffffff;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        
        /* 🟩 MATRIX LIVE CANVAS BACKGROUND - FULLY HIGHLIGHTED */
        #coderRain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 1.0; /* Full opacity taaki ekdum saaf chamke */
            pointer-events: none;
            z-index: 1;
        }

        /* 🟩 CYBERPUNK TERMINAL OVERLAY WITH INTENSE GLOW HIGHLIGHTS */
        #terminalOverlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: rgba(5, 7, 15, 0.65);
            backdrop-filter: blur(4px);
            pointer-events: none;
        }

        .terminal-status-box {
            background: rgba(8, 12, 22, 0.95);
            border: 3px solid #00ff66;
            box-shadow: 0 0 40px rgba(0, 255, 102, 0.5), 
                        0 0 100px rgba(0, 255, 102, 0.2),
                        inset 0 0 20px rgba(0, 255, 102, 0.2);
            padding: 40px 60px;
            text-align: center;
            border-radius: 12px;
            min-width: 480px;
            position: relative;
        }

        .terminal-status-box::before {
            content: '';
            position: absolute;
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 6px;
            background: #00ff66;
            border-radius: 10px;
            filter: blur(6px);
            opacity: 0.9;
        }

        .access-text {
            font-family: monospace;
            font-size: 3.2rem;
            font-weight: bold;
            letter-spacing: 5px;
            color: #ffffff;
            text-shadow: 0 0 10px #00ff66, 
                         0 0 25px #00ff66, 
                         0 0 50px #00ff66, 
                         0 0 100px rgba(0, 255, 102, 0.6);
            margin-bottom: 12px;
            display: none; 
            animation: neonBreathing 1.8s ease-in-out infinite;
        }

        .sub-status {
            font-family: monospace;
            color: #a3a8b3;
            font-size: 14px;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .cyber-progress-bg {
            width: 100%;
            height: 18px;
            background: #111625;
            border: 1px solid rgba(0, 255, 102, 0.4);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .cyber-progress-bar {
            height: 100%;
            width: 0%;
            background: #00ff66;
            box-shadow: 0 0 15px #00ff66, 0 0 5px #ffffff;
            transition: width 0.1s linear;
        }

        .terminal-logs {
            font-family: monospace;
            color: #00ff66;
            font-size: 11px;
            text-align: left;
            margin-top: 25px;
            max-height: 90px;
            overflow: hidden;
            opacity: 0.85;
            line-height: 1.6;
            text-shadow: 0 0 2px rgba(0, 255, 102, 0.5);
        }

        @keyframes neonBreathing {
            0%, 100% {
                opacity: 1;
                text-shadow: 0 0 12px #00ff66, 0 0 25px #00ff66, 0 0 60px #00ff66, 0 0 120px rgba(0, 255, 102, 0.6);
            }
            50% {
                opacity: 0.8;
                text-shadow: 0 0 6px #00ff66, 0 0 15px #00ff66, 0 0 35px #00ff66;
            }
        }

        /* Left Side Layout with Frosted Glass Touch */
        .left-side {
            flex: 1.2;
            background: linear-gradient(135deg, rgba(10, 15, 30, 0.8) 0%, rgba(5, 7, 15, 0.85) 100%);
            backdrop-filter: blur(8px); /* Blur lagaya taaki background animation classy lage peeche */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            border-right: 1px solid rgba(0, 255, 102, 0.15);
            z-index: 5;
        }
        .banner-content {
            text-align: center;
            z-index: 2;
            max-width: 520px;
        }
        .banner-content h1 {
            font-size: 3.5rem;
            color: #1a73e8;
            margin-bottom: 25px;
            letter-spacing: 2px;
            font-weight: 900;
        }
        .banner-content h1 span { color: #00ff66; }
        .banner-content h2 {
            font-size: 1.9rem;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: 800;
            line-height: 1.3;
        }
        .banner-content p {
            color: #b0b5c0;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .features-badges {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .badge {
            background: rgba(26, 115, 232, 0.1);
            border: 1px solid rgba(26, 115, 232, 0.3);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
        }
        .badge.green { border-color: rgba(0, 255, 102, 0.5); color: #00ff66; box-shadow: 0 0 10px rgba(0, 255, 102, 0.2); }

        /* Right Side Layout with Frosted Glass Touch */
        .right-side {
            flex: 1;
            background-color: rgba(8, 12, 24, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            z-index: 5;
        }
        .login-box { width: 100%; max-width: 400px; }
        .login-box h2 { font-size: 2rem; margin-bottom: 8px; color: #ffffff; }
        .login-box p.subtitle { color: #8f9399; font-size: 14px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; color: #c2c7d0; margin-bottom: 8px; }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(22, 28, 46, 0.9);
            border: 1px solid rgba(26, 115, 232, 0.2);
            border-radius: 6px;
            color: #ffffff;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 10px rgba(26, 115, 232, 0.2);
        }
        .forgot-pass {
            display: block;
            text-align: right;
            font-size: 13px;
            color: #1a73e8;
            text-decoration: none;
            margin-bottom: 25px;
        }
        .forgot-pass:hover { text-decoration: underline; }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .login-btn:hover {
            background: #155cb8;
            box-shadow: 0 0 15px rgba(26, 115, 232, 0.4);
        }
