<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amity Style Header</title>
    <!-- FontAwesome Icons ke liye -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Announcement Bar -->
    <div class="top-announcement">
        <span>Get up to 45% merit-based scholarship on semester fee. Limited Seats.</span>
        <a href="#">Apply Now.</a>
    </div>

    <!-- Main Header / Navigation -->
    <header class="main-header">
        
        <!-- Left Section: Logo & Main Nav -->
        <div class="header-left">
            <div class="logo">
                <span class="logo-title">AMITY</span>
                <span class="logo-sub">UNIVERSITY ONLINE</span>
            </div>
            <nav class="nav-links">
                <div class="dropdown">
                    <a href="#">Programs <i class="fa-solid fa-chevron-down icon-small"></i></a>
                </div>
                <a href="#">Career Services</a>
            </nav>
        </div>

        <!-- Center Section: Search Bar -->
        <div class="header-center">
            <div class="search-box">
                <input type="text" placeholder="Search for MBA">
                <button type="button"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>

        <!-- Right Section: Action Buttons -->
        <div class="header-right">
            <a href="#" class="btn-apply">Apply Now</a>
            <a href="#" class="btn-outline">Login/Register</a>
            <a href="#" class="btn-outline">Student Support</a>
        </div>

    </header>

</body>
</html>
