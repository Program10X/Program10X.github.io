<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program10X | Login to Learn C & AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #05070f; /* Deep Dark Space */
            color: #ffffff;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        
        /* 🟩 MATRIX LIVE CANVAS BACKGROUND - KEEPS THE VIBE */
        #coderRain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.15; /* Subtle and classy */
            pointer-events: none;
            z-index: 1;
        }

        /* 🟩 CYBERPUNK TERMINAL OVERLAY (ACCESS GRANTED ANIMATION) - UPDATED LOOK */
        #terminalOverlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10; /* Everything above this will be dark */
            background: rgba(5, 7, 15, 0.6);
            backdrop-filter: blur(4px); /* For frosted glass popup */
            pointer-events: none;
        }

        .terminal-status-box {
            background: rgba(16, 22, 38, 0.9);
            border: 2px solid #00ff66;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.3), 
                        0 0 100px rgba(0, 255, 102, 0.1); 
            padding: 40px 60px;
            text-align: center;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            min-width: 480px;
            position: relative;
            overflow: hidden;
        }

        /* Subtle glowing top highlight */
        .terminal-status-box::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 4px;
            background: #00ff66;
            border-radius: 10px;
            filter: blur(6px);
            opacity: 0.8;
        }

        .access-text {
            font-family: monospace;
            font-size: 3.2rem;
            font-weight: bold;
            letter-spacing: 5px;
            color: #ffffff; /* Starting with white-hot green center */
            text-shadow: 0 0 10px #00ff66, 
                         0 0 20px #00ff66, 
                         0 0 40px #00ff66, 
                         0 0 80px rgba(0, 255, 102, 0.4);
            margin-bottom: 12px;
            display: none; /* Starting hidden */
            animation: neonBreathing 2s ease-in-out infinite;
        }

        .sub-status {
            font-family: monospace;
            color: #a3a8b3;
            font-size: 14px;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* Cleaned up Progress Bar */
        .cyber-progress-bg {
            width: 100%;
            height: 18px;
            background: #111625;
            border: 1px solid rgba(0, 255, 102, 0.4);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .cyber-progress-bar {
            height: 100%;
            width: 0%;
            background: #00ff66;
            box-shadow: 0 0 15px #00ff66, 0 0 5px #ffffff;
            transition: width 0.1s linear;
        }

        /* Terminal Real-time logs */
        .terminal-logs {
            font-family: monospace;
            color: #00ff66;
            font-size: 11px;
            text-align: left;
            margin-top: 25px;
            max-height: 90px;
            overflow: hidden;
            opacity: 0.85;
            line-height: 1.6;
        }

        /* Refined neon breathing animation */
        @keyframes neonBreathing {
            0%, 100% {
                opacity: 1;
                text-shadow: 0 0 12px #00ff66, 0 0 25px #00ff66, 0 0 60px #00ff66, 0 0 120px rgba(0, 255, 102, 0.6);
            }
            50% {
                opacity: 0.8;
                text-shadow: 0 0 6px #00ff66, 0 0 15px #00ff66, 0 0 35px #00ff66;
            }
        }
