<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program10X | Login to Learn C & AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #03050a; /* Ultra Deep Space Black */
            color: #ffffff;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        
        /* 🟩 HIGH-CONTRAST MODERN MATRIX BACKGROUND */
        #coderRain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.35; /* Balance visibility: not too bright, not too dark */
            pointer-events: none;
            z-index: 1;
        }

        /* 🟩 CYBERPUNK TERMINAL OVERLAY (ACCESS GRANTED POPUP) */
        #terminalOverlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            background: rgba(3, 5, 10, 0.7);
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        .terminal-status-box {
            background: rgba(10, 15, 28, 0.95);
            border: 2px solid #00ff66;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.3), inset 0 0 15px rgba(0, 255, 102, 0.1); 
            padding: 40px 60px;
            text-align: center;
            border-radius: 12px;
            min-width: 460px;
            position: relative;
        }

        .access-text {
            font-family: monospace;
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 4px;
            color: #ffffff; 
            text-shadow: 0 0 10px #00ff66, 0 0 20px #00ff66, 0 0 40px rgba(0, 255, 102, 0.5);
            margin-bottom: 12px;
            display: none;
            animation: neonBreathing 2s ease-in-out infinite;
        }

        .sub-status {
            font-family: monospace;
            color: #a3a8b3;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .cyber-progress-bg {
            width: 100%;
            height: 16px;
            background: #111625;
            border: 1px solid rgba(0, 255, 102, 0.3);
            border-radius: 6px;
            overflow: hidden;
        }

        .cyber-progress-bar {
            height: 100%;
            width: 0%;
            background: #00ff66;
            box-shadow: 0 0 15px #00ff66;
            transition: width 0.1s linear;
        }

        .terminal-logs {
            font-family: monospace;
            color: #00ff66;
            font-size: 11px;
            text-align: left;
            margin-top: 25px;
            max-height: 80px;
            overflow: hidden;
            opacity: 0.85;
            line-height: 1.6;
        }

        @keyframes neonBreathing {
            0%, 100% { opacity: 1; text-shadow: 0 0 12px #00ff66, 0 0 25px #00ff66; }
            50% { opacity: 0.8; text-shadow: 0 0 6px #00ff66, 0 0 15px #00ff66; }
        }

        /* 🆕 GEN Z MODERN GLASS LAYOUT OVERHAUL */
        
        .left-side {
            flex: 1.2;
            background: linear-gradient(135deg, rgba(10, 16, 32, 0.75) 0%, rgba(5, 8, 15, 0.85) 100%);
            backdrop-filter: blur(12px); /* High-end modern blur */
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            border-right: 1px solid rgba(26, 115, 232, 0.15);
            z-index: 5;
        }

        .banner-content {
            text-align: center;
            z-index: 2;
            max-width: 520px;
        }

        .banner-content h1 {
            font-size: 3.5rem;
            color: #1a73e8;
            margin-bottom: 25px;
            letter-spacing: 2px;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(26, 115, 232, 0.2);
        }
