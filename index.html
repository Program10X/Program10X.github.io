<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program10X | Kali Desktop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background-color: #1a1c23; /* Kali Dark Grey */
            /* Kali Linux Dragon Watermark Effect using CSS */
            background-image: radial-gradient(circle at 80% 20%, rgba(26, 115, 232, 0.15) 0%, transparent 50%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            color: #ffffff;
        }

        /* Top Bar (Kali Panel) */
        .kali-panel {
            background: #101216;
            height: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid #282c34;
            font-size: 13px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        .panel-left, .panel-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .kali-menu-icon {
            color: #1a73e8; /* Kali Official Blue */
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .panel-item {
            color: #c2c7d0;
            cursor: pointer;
        }
        .panel-item:hover {
            color: #ffffff;
        }

        /* Desktop Area */
        .desktop {
            padding-top: 50px;
            padding-left: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 90px);
            grid-auto-rows: 95px;
            gap: 20px;
            height: 100%;
        }

        /* Desktop App Icons */
        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: white;
            padding: 10px 5px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .desktop-icon:hover {
            background: rgba(26, 115, 232, 0.2);
            outline: 1px solid rgba(26, 115, 232, 0.4);
        }
        .icon-image {
            width: 42px;
            height: 42px;
            background: #21252b;
            border: 1px solid #1a73e8;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            margin-bottom: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            color: #1a73e8;
        }
        .icon-text {
            font-size: 12px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            font-weight: 500;
        }

        /* Big Background Center Text */
        .bg-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-translate(-50%, -50%));
            font-size: 7vw;
            font-weight: 900;
            color: rgba(25xff, 255, 255, 0.03);
            letter-spacing: 5px;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="kali-panel">
        <div class="panel-left">
            <div class="kali-menu-icon">﹫ KALI</div>
            <div class="panel-item">Applications</div>
            <div class="panel-item">Places</div>
        </div>
        <div class="panel-right">
            <div class="panel-item">🌐 program10x</div>
            <div class="panel-item" id="clock">23:00</div>
        </div>
    </div>

    <div class="bg-logo">PROGRAM10X</div>

    <div class="desktop">
        <a href="#cyber-security" class="desktop-icon">
            <div class="icon-image">💀</div>
            <div class="icon-text">Cyber Sec</div>
        </a>
        <a href="#projects" class="desktop-icon">
            <div class="icon-image">📁</div>
            <div class="icon-text">Projects</div>
        </a>
        <a href="#tutorials" class="desktop-icon">
            <div class="icon-image">📖</div>
            <div class="icon-text">Tutorials</div>
        </a>
        <a href="#contact" class="desktop-icon">
            <div class="icon-image">✉️</div>
            <div class="icon-text">Contact Me</div>
        </a>
    </div>

    <script>
        // Simple script to show live time in the top bar
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('clock').textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
