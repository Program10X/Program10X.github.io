<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program10X | Live Hacker Code Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #020204; /* Ultra Dark Pitch Black for ultimate contrast */
            color: #ffffff;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        
        /* 🟩 HIGH-DENSITY GLOWING MATRIX BACKGROUND */
        #coderRain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 1.0; 
            pointer-events: none;
            z-index: 1;
        }

        /* All other original page content and overlay elements removed as requested. */
    </style>
</head>
<body>

    <canvas id="coderRain"></canvas>

    <script>
        const canvas = document.getElementById('coderRain');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const alphabet = "010101010101010101010101ABCDEFGHIJKLMNOPQRSTUVWXYZ<>[]{}/_=+X%#$@";
        const fontSize = 12; 
        const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);

        for (let x = 0; x < columns; x++) {
            rainDrops[x] = Math.random() * -100;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(2, 2, 4, 0.05)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#00ff66'; 
            ctx.font = 'bold ' + fontSize + 'px monospace';
            
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#00ff66';
            
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.985) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
            ctx.shadowBlur = 0; 
        }
        setInterval(drawMatrix, 28); 
    </script>
</body>
</html>
