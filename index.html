<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program10X | Login to Learn C & AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0b0f19; /* Program10X Dark Theme */
            color: #ffffff;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Left Side: Premium Banner Box */
        .left-side {
            flex: 1.2;
            background: linear-gradient(135deg, #101626 0%, #0b0f19 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            border-right: 1px solid rgba(26, 115, 232, 0.1);
        }
        /* Tech Circle Animation background */
        .left-side::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(26, 115, 232, 0.15) 0%, transparent 70%);
            top: 20%;
            left: 20%;
        }
        .banner-content {
            text-align: center;
            z-index: 2;
            max-width: 500px;
        }
        .banner-content h1 {
            font-size: 3rem;
            color: #1a73e8;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        .banner-content h1 span {
            color: #00ff66; /* Neon Green */
        }
        .banner-content p {
            color: #8f9399;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .features-badges {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .badge {
            background: rgba(26, 115, 232, 0.1);
            border: 1px solid rgba(26, 115, 232, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #ffffff;
        }

        /* Right Side: Clean Login Form */
        .right-side {
            flex: 1;
            background-color: #0f1422;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        .login-box {
            width: 100%;
            max-width: 400px;
        }
        .login-box h2 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #ffffff;
        }
        .login-box p.subtitle {
            color: #8f9399;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            color: #c2c7d0;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #161c2e;
            border: 1px solid rgba(26, 115, 232, 0.2);
            border-radius: 6px;
            color: #ffffff;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 10px rgba(26, 115, 232, 0.2);
        }
        .forgot-pass {
            display: block;
            text-align: right;
            font-size: 13px;
            color: #1a73e8;
            text-decoration: none;
            margin-bottom: 25px;
        }
        .forgot-pass:hover {
            text-decoration: underline;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .login-btn:hover {
            background: #155cb8;
            box-shadow: 0 0 15px rgba(26, 115, 232, 0.4);
        }

        /* Responsive Design for Mobile */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .left-side {
                display: none; /* Mobile par sirf login form dikhega */
            }
            .right-side {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="left-side">
        <div class="banner-content">
            <h1>PROGRAM<span>10X</span></h1>
            <p>Sikhayein apne dimaag ko naye daur ki coding. Learn foundational C Programming and step into the future with Artificial Intelligence.</p>
            <div class="features-badges">
                <span class="badge">💻 C Language</span>
                <span class="badge">🤖 AI & ML</span>
            </div>
        </div>
    </div>

    <div class="right-side">
        <div class="login-box">
            <h2>Hi, Welcome to P10X</h2>
            <p class="subtitle">Enter your details to log in your account</p>
            
            <form onsubmit="event.preventDefault(); alert('Login System Connected Successfully!');">
                <div class="input-group">
                    <label for="username">Username / Email *</label>
                    <input type="email" id="username" placeholder="name@program10x.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                
                <a href="#" class="forgot-pass">Forgot your password?</a>
                
                <button type="submit" class="login-btn">Log in</button>
            </form>
        </div>
    </div>

</body>
</html>
